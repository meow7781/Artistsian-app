<svg width="32" height="32" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="192" height="192" rx="48" fill="#0d0d0d"/>
  
  <!-- Golden decorative frame -->
  <rect x="12" y="12" width="168" height="168" rx="40" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.4"/>
  
  <!-- Ornamental corners -->
  <line x1="30" y1="24" x2="30" y2="40" stroke="#d4af37" stroke-width="2"/>
  <line x1="24" y1="30" x2="40" y2="30" stroke="#d4af37" stroke-width="2"/>
  
  <line x1="162" y1="24" x2="162" y2="40" stroke="#d4af37" stroke-width="2"/>
  <line x1="152" y1="30" x2="168" y2="30" stroke="#d4af37" stroke-width="2"/>
  
  <line x1="30" y1="152" x2="30" y2="168" stroke="#d4af37" stroke-width="2"/>
  <line x1="24" y1="162" x2="40" y2="162" stroke="#d4af37" stroke-width="2"/>
  
  <line x1="162" y1="152" x2="162" y2="168" stroke="#d4af37" stroke-width="2"/>
  <line x1="152" y1="162" x2="168" y2="162" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Central ornamental circle -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.3"/>
  <circle cx="96" cy="96" r="65" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.2"/>
  
  <!-- S monogram -->
  <text x="96" y="128" font-family="Playfair Display, serif" font-size="100" font-weight="700" fill="#d4af37" text-anchor="middle">S</text>
  
  <!-- Decorative flourishes -->
  <path d="M 50 90 Q 55 85 60 90" stroke="#d4af37" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 132 90 Q 137 85 142 90" stroke="#d4af37" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Bottom text indicator (subtle) -->
  <circle cx="96" cy="155" r="2" fill="#d4af37" opacity="0.6"/>
</svg>
